<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>吉馬 JSON Extractor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      line-height: 1.6;
      color: #333;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 30px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #222;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .section {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
      color: #333;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: Monaco, Menlo, Consolas, "Noto Sans Mono", monospace;
      font-size: 13px;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: #4CAF50;
      box-shadow: 0 0 0 3px rgba(76,175,80,0.12);
    }

    #textInput {
      height: 240px;
    }

    #jsonOutput {
      height: 340px;
      background: #f9f9f9;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 18px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      color: #333;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }

    button:hover {
      background: #f5f5f5;
      border-color: #999;
    }

    button.primary {
      background: #4CAF50;
      color: #fff;
      border-color: #4CAF50;
    }

    button.primary:hover {
      background: #45a049;
      border-color: #45a049;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error,
    .success {
      display: none;
      padding: 12px;
      margin-bottom: 16px;
      border-radius: 4px;
      font-size: 13px;
    }

    .error {
      background: #ffebee;
      color: #c62828;
    }

    .success {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .error.show,
    .success.show {
      display: block;
    }

    .output-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 10px;
    }

    .copy-btn {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .instructions {
      background: #f0f4f8;
      padding: 15px;
      border-radius: 4px;
      font-size: 13px;
      color: #333;
      margin-top: 20px;
    }

    .instructions ol {
      margin-left: 20px;
      margin-top: 10px;
    }

    .instructions li {
      margin-bottom: 6px;
    }

    .hint {
      margin-top: 8px;
      color: #666;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>吉馬 JSON Extractor</h1>
    <p class="subtitle">吉馬のテキストを JSON 形式に変換します。馬名だけある行でも数値は 0 で埋めます。</p>

    <div id="error" class="error"></div>
    <div id="success" class="success"></div>

    <div class="section">
      <label for="textInput">レースデータを貼り付け</label>
      <textarea id="textInput" placeholder="吉馬のページからコピーしたテキストを貼り付けてください"></textarea>
      <div class="hint">競馬場名、R、レース名、距離、馬の一覧が入ったテキストをそのまま貼り付けてください。</div>
    </div>

    <div class="button-group">
      <button class="primary" onclick="extractJSON()">テキストから抽出</button>
      <button onclick="clearAll()">クリア</button>
    </div>

    <div class="section">
      <div class="output-label">
        <label for="jsonOutput">JSON 出力</label>
        <button class="copy-btn" onclick="copyJSON()" id="copyBtn" style="display:none;">コピー</button>
      </div>
      <textarea id="jsonOutput" readonly></textarea>
    </div>

    <div class="instructions">
      <strong>使い方：</strong>
      <ol>
        <li>吉馬のページを開く</li>
        <li>レース情報と馬一覧を含むテキストをコピーする</li>
        <li>上のテキストエリアに貼り付ける</li>
        <li>「テキストから抽出」をクリックする</li>
        <li>JSON をコピーして利用する</li>
      </ol>
    </div>
  </div>

  <script>
    function showError(msg) {
      const errorEl = document.getElementById("error");
      const successEl = document.getElementById("success");
      errorEl.textContent = msg;
      errorEl.classList.add("show");
      successEl.classList.remove("show");
    }

    function showSuccess(msg) {
      const successEl = document.getElementById("success");
      const errorEl = document.getElementById("error");
      successEl.textContent = msg;
      successEl.classList.add("show");
      errorEl.classList.remove("show");
    }

    function clearMessages() {
      document.getElementById("error").classList.remove("show");
      document.getElementById("success").classList.remove("show");
    }

    function toInt(v) {
      const n = parseInt(String(v ?? "").trim(), 10);
      return Number.isFinite(n) ? n : 0;
    }

    function toFloat(v) {
      const n = parseFloat(String(v ?? "").trim());
      return Number.isFinite(n) ? n : 0;
    }

    function looksLikeHorseName(text) {
      if (!text) return false;
      if (/^(東京|中山|阪神|京都|札幌|函館|福島|新潟|中京|小倉|川崎|船橋|大井|浦和|名古屋|園田|門別)$/.test(text)) return false;
      return /[ぁ-んァ-ヶー一-龠A-Za-z]/.test(text);
    }

    function extractJSON() {
      clearMessages();

      const textInput = document.getElementById("textInput").value;
      if (!textInput.trim()) {
        showError("テキストを貼り付けてください");
        return;
      }

      try {
        const rawLines = textInput.split(/
?
/);
        const lines = rawLines.map(line => line.trim()).filter(Boolean);

        if (lines.length === 0) {
          showError("有効なテキストが見つかりませんでした");
          return;
        }

        let venue = "";
        let raceNum = "";
        let surface = "";
        let distance = 0;
        let raceName = "";
        let grade = "";

        for (let i = 0; i < Math.min(lines.length, 25); i++) {
          const line = lines[i];

          if (!venue && !looksLikeHorseName(line) && line.length <= 10) {
            venue = line;
          }

          const rn = line.match(/\b(d+)R\b/);
          if (!raceNum && rn) raceNum = rn[0];

          const surfaceMatch = line.match(/([芝ダ障])(d{3,4})m/);
          if (surfaceMatch) {
            surface = surfaceMatch[1];
            distance = toInt(surfaceMatch[2]);
          }

          if (line.includes("GI")) grade = "GI";
          else if (line.includes("GII")) grade = "GII";
          else if (line.includes("GIII")) grade = "GIII";
          else if (line.includes("L")) grade = "L";
          else if (line.includes("OP")) grade = "OP";

          if (line.match(/(レース|ステークス|記念|賞|杯|特別|選抜|条件|戦|S)$/)) {
            raceName = line.replace(/^d+Rs*/, "").trim();
          }
        }

        const horses = [];
        for (let i = 0; i < rawLines.length; i++) {
          const line = rawLines[i].trim();
          if (!line) continue;

          if (
            line.includes("馬名") ||
            line.includes("着順") ||
            line.includes("人気") ||
            line.includes("オッズ") ||
            line.includes("払戻") ||
            line.includes("買い目") ||
            line.includes("予想") ||
            line.includes("結果") ||
            line.includes("単勝") ||
            line.includes("複勝")
          ) {
            continue;
          }

          const horse = parseTextLine(line);
          if (horse && horse.name) horses.push(horse);
        }

        const uniqueHorses = [];
        const seen = new Set();
        for (const h of horses) {
          const key = `${h.num}-${h.name}`;
          if (!seen.has(key)) {
            seen.add(key);
            uniqueHorses.push(h);
          }
        }

        if (uniqueHorses.length === 0) {
          showError("馬データを抽出できませんでした。貼り付け形式を確認してください。");
          return;
        }

        const result = {
          raceinfo: {
            venue,
            raceNum,
            surface,
            distance,
            raceName,
            grade
          },
          horses: uniqueHorses
        };

        document.getElementById("jsonOutput").value = JSON.stringify(result, null, 2);
        document.getElementById("copyBtn").style.display = "inline-block";
        showSuccess(`${uniqueHorses.length} 件の馬データを抽出しました`);
      } catch (err) {
        showError("エラー: " + err.message);
      }
    }

    function parseTextLine(line) {
      let parts = line.split("\t").map(p => p.trim()).filter(Boolean);

      if (parts.length < 2) {
        parts = line.split(/s+/).filter(Boolean);
      }

      if (parts.length === 0) return null;

      const numberCandidates = parts.filter(p => /^d+$/.test(p));
      const nameCandidates = parts.filter(p => looksLikeHorseName(p));

      const num = numberCandidates.length ? toInt(numberCandidates[0]) : 0;
      const name = nameCandidates.length ? nameCandidates[0] : "";

      if (!name) return null;

      const numSet = new Set(numberCandidates.map(toInt));
      const floatCandidates = parts.map(toFloat).filter(n => Number.isFinite(n));
      const intCandidates = parts.map(toInt).filter(n => Number.isFinite(n));

      let sp = 0;
      let senkou = 0;
      let spmax = 0;
      let suikyaku = 0;

      if (floatCandidates.length > 0) sp = floatCandidates[0];
      if (intCandidates.length > 1) senkou = intCandidates[1];
      if (intCandidates.length > 2) spmax = intCandidates[2];
      if (intCandidates.length > 3) suikyaku = intCandidates[3];

      if (num === 0 && numSet.size > 0) {
        const first = [...numSet][0];
        if (first) sp = sp || 0;
      }

      return {
        num,
        name,
        sp,
        senkou,
        spmax,
        suikyaku,
        agarirank: null
      };
    }

    function copyJSON() {
      const textarea = document.getElementById("jsonOutput");
      textarea.select();
      document.execCommand("copy");
      showSuccess("JSON をコピーしました");
    }

    function clearAll() {
      document.getElementById("textInput").value = "";
      document.getElementById("jsonOutput").value = "";
      document.getElementById("copyBtn").style.display = "none";
      clearMessages();
    }
  </script>
</body>
</html>
