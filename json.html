<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>吉馬 JSON Extractor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      line-height: 1.6;
      color: #333;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 30px;
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: #222; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
    .section { margin-bottom: 24px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #333; }
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: Monaco, Menlo, Consolas, "Noto Sans Mono", monospace;
      font-size: 13px;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: #4CAF50;
      box-shadow: 0 0 0 3px rgba(76,175,80,0.12);
    }
    #textInput { height: 240px; }
    #jsonOutput { height: 340px; background: #f9f9f9; }
    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 18px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      color: #333;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    button:hover { background: #f5f5f5; border-color: #999; }
    button.primary {
      background: #4CAF50;
      color: #fff;
      border-color: #4CAF50;
    }
    button.primary:hover { background: #45a049; border-color: #45a049; }
    .error, .success {
      display: none;
      padding: 12px;
      margin-bottom: 16px;
      border-radius: 4px;
      font-size: 13px;
    }
    .error { background: #ffebee; color: #c62828; }
    .success { background: #e8f5e9; color: #2e7d32; }
    .error.show, .success.show { display: block; }
    .output-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 10px;
    }
    .copy-btn { padding: 6px 12px; font-size: 12px; font-weight: 600; }
    .instructions {
      background: #f0f4f8;
      padding: 15px;
      border-radius: 4px;
      font-size: 13px;
      color: #333;
      margin-top: 20px;
    }
    .instructions ol { margin-left: 20px; margin-top: 10px; }
    .instructions li { margin-bottom: 6px; }
    .hint { margin-top: 8px; color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>吉馬 JSON Extractor</h1>
    <p class="subtitle">吉馬の出馬表テキストを JSON 形式に変換します。馬名だけある行でも数値は 0 で埋めます。</p>

    <div id="error" class="error"></div>
    <div id="success" class="success"></div>

    <div class="section">
      <label for="textInput">レースデータを貼り付け</label>
      <textarea id="textInput" placeholder="吉馬のページからコピーしたテキストを貼り付けてください"></textarea>
      <div class="hint">出馬表のテキストをそのまま貼り付けてください。</div>
    </div>

    <div class="button-group">
      <button type="button" class="primary" onclick="extractJSON()">テキストから抽出</button>
      <button type="button" onclick="clearAll()">クリア</button>
    </div>

    <div class="section">
      <div class="output-label">
        <label for="jsonOutput">JSON 出力</label>
        <button type="button" class="copy-btn" onclick="copyJSON()" id="copyBtn" style="display:none;">コピー</button>
      </div>
      <textarea id="jsonOutput" readonly></textarea>
    </div>
  </div>

  <script>
    const venueNames = ["東京","中山","阪神","京都","札幌","函館","福島","新潟","中京","小倉","川崎","船橋","大井","浦和","名古屋","園田","門別"];

    function showError(msg) {
      const errorEl = document.getElementById("error");
      const successEl = document.getElementById("success");
      errorEl.textContent = msg;
      errorEl.classList.add("show");
      successEl.classList.remove("show");
    }

    function showSuccess(msg) {
      const successEl = document.getElementById("success");
      const errorEl = document.getElementById("error");
      successEl.textContent = msg;
      successEl.classList.add("show");
      errorEl.classList.remove("show");
    }

    function clearMessages() {
      document.getElementById("error").classList.remove("show");
      document.getElementById("success").classList.remove("show");
    }

    function toInt(v) {
      const n = parseInt(String(v ?? "").trim(), 10);
      return Number.isFinite(n) ? n : 0;
    }

    function toFloat(v) {
      const n = parseFloat(String(v ?? "").trim());
      return Number.isFinite(n) ? n : 0;
    }

    function isVenueLine(t) {
      return venueNames.includes(t);
    }

    function looksLikeHorseName(text) {
      if (!text) return false;
      if (isVenueLine(text)) return false;
      if (/^(出馬表|SP履歴|ランク|推奨|結果|本紙の決断|レース短評|3連単推奨フォーメーション)$/.test(text)) return false;
      return /[ぁ-んァ-ヶー一-龠A-Za-z]/.test(text);
    }

    function extractJSON() {
      clearMessages();

      const textInput = document.getElementById("textInput").value;
      if (!textInput.trim()) {
        showError("テキストを貼り付けてください");
        return;
      }

      try {
        const rawLines = textInput.split(/
?
/);
        const lines = rawLines.map(v => v.replace(/　/g, " ").trim()).filter(Boolean);

        if (lines.length === 0) {
          showError("有効なテキストが見つかりませんでした");
          return;
        }

        let venue = "";
        let raceNum = "";
        let surface = "";
        let distance = 0;
        let raceName = "";
        let grade = "";

        for (let i = 0; i < Math.min(lines.length, 40); i++) {
          const line = lines[i];

          if (!venue && isVenueLine(line)) venue = line;

          const rn = line.match(/\b(d+)R\b/);
          if (!raceNum && rn) raceNum = rn[0];

          const sm = line.match(/([芝ダ障])(d{3,4})m/);
          if (sm) {
            surface = sm[1];
            distance = toInt(sm[2]);
          }

          if (line.includes("GIII")) grade = "GIII";
          else if (line.includes("GII")) grade = "GII";
          else if (line.includes("GI")) grade = "GI";
          else if (line.includes("OP")) grade = "OP";
          else if (line.includes("L")) grade = "L";

          if (/(ステークス|記念|賞|杯|特別|選抜|条件|S$)/.test(line) && !/^(出馬表|SP履歴|ランク|推奨|結果)$/.test(line)) {
            raceName = line.replace(/^d+Rs*/, "").trim();
          }
        }

        const horses = [];
        let inHorseArea = false;

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];

          if (line.includes("競　走　馬　名") || line.includes("競走馬名")) {
            inHorseArea = true;
            continue;
          }

          if (!inHorseArea) continue;

          const h = parseHorseLine(line);
          if (h) horses.push(h);
        }

        const unique = [];
        const seen = new Set();
        for (const h of horses) {
          const key = `${h.num}-${h.name}`;
          if (!seen.has(key)) {
            seen.add(key);
            unique.push(h);
          }
        }

        if (unique.length === 0) {
          showError("馬データを抽出できませんでした。貼り付け形式を確認してください。");
          return;
        }

        const result = {
          raceinfo: {
            venue,
            raceNum,
            surface,
            distance,
            raceName,
            grade
          },
          horses: unique
        };

        document.getElementById("jsonOutput").value = JSON.stringify(result, null, 2);
        document.getElementById("copyBtn").style.display = "inline-block";
        showSuccess(`${unique.length} 件の馬データを抽出しました`);
      } catch (err) {
        showError("エラー: " + err.message);
      }
    }

    function parseHorseLine(line) {
      const t = line.replace(/　/g, " ").trim();
      if (!/^d+s/.test(t)) return null;
      if (/^(馬|能力値|競走馬名|先行力|SP信頼|SP調整|SP最大|末脚力)$/.test(t)) return null;

      const tokens = t.split(/s+/).filter(Boolean);
      const num = toInt(tokens[0]);
      if (!num) return null;

      let name = "";
      for (let i = 1; i < tokens.length; i++) {
        const tok = tokens[i];
        if (looksLikeHorseName(tok) && !/^[…・△▲○◎]$/.test(tok) && !/^d+(?:.d+)?$/.test(tok)) {
          name = tok;
          break;
        }
      }

      if (!name) {
        const m = t.match(/^d+s+.*?s([^ds]+)s+d/);
        if (m) name = m[1].trim();
      }

      if (!name) return null;

      const nums = t.match(/-?d+(?:.d+)?/g) || [];
      const values = nums.map(toFloat);

      const sp = values.length >= 2 ? values[1] : 0;
      const senkou = values.length >= 3 ? toInt(values[2]) : 0;
      const spmax = values.length >= 4 ? toInt(values[3]) : 0;
      const suikyaku = values.length >= 5 ? toInt(values[4]) : 0;

      return {
        num,
        name,
        sp,
        senkou,
        spmax,
        suikyaku,
        agarirank: null
      };
    }

    function copyJSON() {
      const ta = document.getElementById("jsonOutput");
      ta.select();
      ta.setSelectionRange(0, 99999);
      const ok = document.execCommand("copy");
      if (ok) showSuccess("JSON をコピーしました");
      else showError("コピーに失敗しました");
    }

    function clearAll() {
      document.getElementById("textInput").value = "";
      document.getElementById("jsonOutput").value = "";
      document.getElementById("copyBtn").style.display = "none";
      clearMessages();
    }
  </script>
</body>
</html>
