<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kichiuma JSON Extractor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
      line-height: 1.6;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 30px;
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #333;
    }
    
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }
    
    .section {
      margin-bottom: 25px;
    }
    
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      color: #333;
      font-size: 14px;
    }
    
    textarea, input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
      font-size: 13px;
      resize: vertical;
    }
    
    textarea:focus, input[type="text"]:focus {
      outline: none;
      border-color: #4CAF50;
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
    }
    
    #textInput {
      height: 200px;
    }
    
    #jsonOutput {
      height: 300px;
      background-color: #f9f9f9;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    button {
      padding: 10px 20px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background-color: white;
      color: #333;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    button:hover {
      background-color: #f5f5f5;
      border-color: #999;
    }
    
    button.primary {
      background-color: #4CAF50;
      color: white;
      border-color: #4CAF50;
    }
    
    button.primary:hover {
      background-color: #45a049;
      border-color: #45a049;
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .error {
      padding: 12px;
      margin-bottom: 15px;
      background-color: #ffebee;
      color: #c62828;
      border-radius: 4px;
      font-size: 13px;
      display: none;
    }
    
    .error.show {
      display: block;
    }
    
    .success {
      padding: 12px;
      margin-bottom: 15px;
      background-color: #e8f5e9;
      color: #2e7d32;
      border-radius: 4px;
      font-size: 13px;
      display: none;
    }
    
    .success.show {
      display: block;
    }
    
    .instructions {
      background-color: #f0f4f8;
      padding: 15px;
      border-radius: 4px;
      font-size: 13px;
      color: #333;
      margin-top: 20px;
    }
    
    .instructions ol {
      margin-left: 20px;
      margin-top: 10px;
    }
    
    .instructions li {
      margin-bottom: 5px;
    }
    
    .output-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .copy-btn {
      padding: 6px 12px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>kichiuma JSON Extractor</h1>
    <p class="subtitle">競馬データを JSON 形式に変換します</p>
    
    <div class="error" id="error"></div>
    <div class="success" id="success"></div>
    
    <div class="section">
      <label for="textInput">レースデータを貼り付け</label>
      <textarea id="textInput" placeholder="競馬場名、レース番号、馬のデータをここに貼り付けてください"></textarea>
    </div>
    
    <div class="button-group">
      <button class="primary" onclick="extractJSON()">テキストから抽出</button>
      <button onclick="clearAll()">クリア</button>
    </div>
    
    <div class="section">
      <div class="output-label">
        <label for="jsonOutput">JSON 出力</label>
        <button class="copy-btn" onclick="copyJSON()" id="copyBtn" style="display: none;">コピー</button>
      </div>
      <textarea id="jsonOutput" readonly></textarea>
    </div>
    
    <div class="instructions">
      <strong>使い方：</strong>
      <ol>
        <li>kichiuma.net のページをブラウザで表示</li>
        <li>以下をコピー：
          <ul style="margin-top: 5px; margin-bottom: 5px; margin-left: 20px;">
            <li>競馬場名（東京、京都など）</li>
            <li>レース番号</li>
            <li>レース名やグレード情報を含む行</li>
            <li>馬場や距離を含む行</li>
            <li>馬のテーブル全体</li>
          </ul>
        </li>
        <li>上のテキストエリアに貼り付け</li>
        <li>「テキストから抽出」をクリック</li>
        <li>JSON をコピーして使用</li>
      </ol>
    </div>
  </div>
  
  <script>
    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('success').classList.remove('show');
    }
    
    function showSuccess(msg) {
      const el = document.getElementById('success');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('error').classList.remove('show');
    }
    
    function clearMessages() {
      document.getElementById('error').classList.remove('show');
      document.getElementById('success').classList.remove('show');
    }
    
    function extractJSON() {
      clearMessages();
      const textInput = document.getElementById('textInput').value;
      
      if (!textInput.trim()) {
        showError('テキストを入力してください');
        return;
      }
      
      try {
        const lines = textInput.split('\n').map(line => line.trim()).filter(line => line);
        
        // Extract race info from first lines
        let venue = '不明';
        let raceNum = '';
        let surface = '芝';
        let distance = 0;
        let raceName = '';
        let grade = '通常';
        
        // Venue is typically first line
        if (lines[0]) {
          venue = lines[0];
        }
        
        // Race number is typically second line
        if (lines[1]) {
          raceNum = lines[1];
        }
        
        // Search for race details in early lines
        for (let i = 0; i < Math.min(lines.length, 15); i++) {
          const line = lines[i];
          
          // Extract surface and distance
          const surfaceMatch = line.match(/([芝ダ])(\d{4})/);
          if (surfaceMatch) {
            surface = surfaceMatch[1];
            distance = parseInt(surfaceMatch[2]);
          }
          
          // Extract grade
          if (line.includes('GI') || line.includes('G1')) {
            grade = 'GI';
          } else if (line.includes('GII') || line.includes('G2')) {
            grade = 'GII';
          } else if (line.includes('GIII') || line.includes('G3')) {
            grade = 'GIII';
          } else if (line.includes('リステッド') || line.match(/L\s|L$/)) {
            grade = 'L';
          } else if (line.includes('OP')) {
            grade = 'OP';
          }
          
          // Extract race name
          if (line.includes('ステークス') || line.includes('特別') || line.includes('杯') || 
              line.includes('記念') || line.includes('ダービー') || line.includes('オークス')) {
            raceName = line.replace(/\s*\(.*\)/, '').trim();
          }
        }
        
        // Find table header line
        let tableStartIdx = -1;
        for (let i = 0; i < lines.length; i++) {
          if (lines[i].includes('馬') && lines[i].includes('競') && lines[i].includes('名')) {
            tableStartIdx = i + 1;
            break;
          }
        }
        
        if (tableStartIdx === -1) {
          showError('馬のテーブルが見つかりません');
          return;
        }
        
        // Parse horse data
        const horses = [];
        for (let i = tableStartIdx; i < lines.length; i++) {
          const line = lines[i];
          if (!line || line.includes('※')) break;
          
          const horse = parseTextLine(line);
          if (horse.name) {
            horses.push(horse);
          }
        }
        
        if (horses.length === 0) {
          showError('馬のデータが見つかりません');
          return;
        }
        
        const result = {
          race_info: {
            venue,
            surface,
            distance,
            race_name: raceName,
            grade
          },
          horses
        };
        
        const jsonStr = JSON.stringify(result, null, 2);
        document.getElementById('jsonOutput').value = jsonStr;
        document.getElementById('copyBtn').style.display = 'inline-block';
        showSuccess(`${horses.length} 頭のデータを抽出しました`);
        
      } catch (err) {
        showError('エラー: ' + err.message);
      }
    }
    
    function parseTextLine(line) {
      // Split by tab character first
      let parts = line.split('\t').map(p => p.trim());
      
      // If no tabs, try splitting by whitespace
      if (parts.length < 5) {
        parts = line.split(/\s+/);
      }
      
      if (parts.length < 13) return { name: '' };
      
      const num = parseInt(parts[0]) || 0;
      if (num === 0 || num > 20) return { name: '' };
      
      // Tab-separated format:
      // 0: num (馬番)
      // 1: eval symbol
      // 2: sp (SP能力値)
      // 3: name (競走馬名)
      // 4: senkou (先行力)
      // 5: sp_trust symbol
      // 6: sp_adjust (SP調整)
      // 7: sp_adjust symbol
      // 8: (中間値)
      // 9: symbol
      // 10: sp_max (SP最大)
      // 11: symbol
      // 12: suikyaku (末脚力)
      
      const sp = parseFloat(parts[2]) || 0;
      const name = parts[3] || '';
      const senkou = parseInt(parts[4]) || 0;
      const sp_max = parseInt(parts[10]) || 0;
      const suikyaku = parseInt(parts[12]) || 0;
      
      return {
        num,
        name,
        sp,
        senkou,
        sp_max,
        suikyaku,
        agari_rank: null
      };
    }
    
    function parseHorseRow(cells) {
      const getText = (cell) => cell?.innerText?.trim() || '';
      const getNum = (cell) => parseInt(getText(cell)) || 0;
      const getFloat = (cell) => parseFloat(getText(cell)) || 0;
      
      const num = getNum(cells[0]);
      const name = getText(cells[2]);
      const sp = getFloat(cells[3]);
      const senkou = getNum(cells[4]);
      
      // sp_max: 右に2個シフト
      const sp_max = getNum(cells[7]) || getNum(cells[8]) || getNum(cells[9]);
      const suikyaku = getNum(cells[10]) || getNum(cells[11]);
      
      return {
        num,
        name,
        sp,
        senkou,
        sp_max,
        suikyaku,
        agari_rank: null
      };
    }
    
    function copyJSON() {
      const textarea = document.getElementById('jsonOutput');
      textarea.select();
      document.execCommand('copy');
      showSuccess('JSON をコピーしました');
    }
    
    function clearAll() {
      document.getElementById('textInput').value = '';
      document.getElementById('jsonOutput').value = '';
      document.getElementById('copyBtn').style.display = 'none';
      clearMessages();
    }
  </script>
</body>
</html>
