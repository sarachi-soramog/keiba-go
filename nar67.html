<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>nar6</title>
<style>
:root{
  --bg:#08101d; --panel:#101a31; --panel2:#0c1528; --line:#223055;
  --text:#ecf2ff; --muted:#97a6c8; --accent:#79c4ff;
  --good:#53e08b; --warn:#f5b04d; --bad:#ff7891;
}
*{box-sizing:border-box}
body{
  margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;
  background:linear-gradient(180deg,#060b14,#08101d 30%,#0b1430);
  color:var(--text);
}
header{max-width:1440px;margin:0 auto;padding:20px 16px 8px}
h1{margin:0;font-size:24px}
p{margin:6px 0 0;color:var(--muted);font-size:13px}
main{
  max-width:1440px;margin:0 auto;padding:12px 16px 24px;
  display:grid;grid-template-columns:1.08fr .92fr;gap:12px;
}
.card{
  background:rgba(16,26,49,.95);border:1px solid var(--line);
  border-radius:16px;overflow:hidden;box-shadow:0 12px 28px rgba(0,0,0,.25);
}
.card h2{
  margin:0;padding:13px 16px;border-bottom:1px solid var(--line);
  font-size:16px;background:rgba(255,255,255,.02);
}
.body{padding:14px 16px}
textarea,input,select{
  width:100%;background:#08101d;color:var(--text);border:1px solid var(--line);
  border-radius:12px;padding:10px 12px;font:13px/1.5 ui-monospace,Consolas,monospace;
}
textarea{min-height:280px;resize:vertical}
.row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:10px}
button{
  border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;
  background:linear-gradient(135deg,#5eaaff,#7bd0ff);color:#05101f;
}
button.secondary{background:#17213b;color:var(--text);border:1px solid var(--line)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.kv{
  background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px;
}
.kv b{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
.kv span{font-size:15px}
.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.pill{
  padding:6px 10px;border:1px solid var(--line);border-radius:999px;
  background:#0b1327;font-size:12px;
}
.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:12px}
table{width:100%;border-collapse:collapse;min-width:1100px;background:#09111f}
th,td{
  padding:10px 10px;border-bottom:1px solid #1c2845;font-size:13px;
  text-align:right;white-space:nowrap;
}
th:first-child,td:first-child,th:nth-child(2),td:nth-child(2){text-align:left}
th{
  position:sticky;top:0;background:#111a31;color:#d9e5ff;z-index:1;
}
.badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:12px;font-weight:700}
.good{background:rgba(83,224,139,.14);color:var(--good)}
.warn{background:rgba(245,176,77,.14);color:var(--warn)}
.bad{background:rgba(255,120,145,.14);color:var(--bad)}
.small{font-size:12px;color:var(--muted);margin-top:8px}
#chart{height:460px}
footer{
  max-width:1440px;margin:0 auto;padding:0 16px 20px;color:var(--muted);font-size:12px;
}
@media (max-width: 1000px){
  main{grid-template-columns:1fr}
  .grid,.row{grid-template-columns:repeat(2,minmax(0,1fr))}
}
</style>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
<header>
  <h1>nar6</h1>
  <p>吉馬JSONを貼るだけで、Excelの係数思想を踏まえてNAR向けに自動採点する単一HTMLです。</p>
</header>

<main>
  <section class="card">
    <h2>入力</h2>
    <div class="body">
      <textarea id="jsonInput">{
  "race_info": {"venue": "大井", "surface": "ダ", "distance": 1800, "race_name": "例示", "grade": "通常"},
  "horses": [
    {"num": 1, "name": "ナチュラルライズ", "sp": 94.2, "senkou": 102, "sp_max": 107, "suikyaku": 69},
    {"num": 3, "name": "アウトレンジ", "sp": 98.4, "senkou": 89, "sp_max": 117, "suikyaku": 88},
    {"num": 4, "name": "ナンセイホワイト", "sp": 89.5, "senkou": 96, "sp_max": 103, "suikyaku": 74},
    {"num": 5, "name": "ロードクロンヌ", "sp": 105.1, "senkou": 77, "sp_max": 111, "suikyaku": 102},
    {"num": 6, "name": "サントノーレ", "sp": 94.9, "senkou": 96, "sp_max": 105, "suikyaku": 80},
    {"num": 7, "name": "マルカンラニ", "sp": 81.2, "senkou": 78, "sp_max": 87, "suikyaku": 83},
    {"num": 8, "name": "ミッキーファイト", "sp": 106.1, "senkou": 91, "sp_max": 119, "suikyaku": 93},
    {"num": 9, "name": "ナイトオブファイア", "sp": 86.9, "senkou": 87, "sp_max": 104, "suikyaku": 77},
    {"num": 10, "name": "ディクテオン", "sp": 94.6, "senkou": 88, "sp_max": 101, "suikyaku": 88},
    {"num": 11, "name": "カズタンジャー", "sp": 65.8, "senkou": 62, "sp_max": 70, "suikyaku": 60},
    {"num": 12, "name": "セラフィックコール", "sp": 66.1, "senkou": 75, "sp_max": 76, "suikyaku": 64},
    {"num": 13, "name": "ラムジェット", "sp": 91.7, "senkou": 83, "sp_max": 99, "suikyaku": 90}
  ]
}</textarea>

      <div class="row">
        <div>
          <select id="venue">
            <option>東京</option><option>中山</option><option>京都</option><option>阪神</option>
            <option>中京</option><option>新潟</option><option>福島</option><option>札幌</option>
            <option>函館</option><option>小倉</option><option>大井</option><option>川崎</option>
            <option>船橋</option><option>浦和</option><option>門別</option><option>園田</option>
            <option>盛岡</option><option>水沢</option><option>高知</option>
          </select>
        </div>
        <div>
          <select id="surface"><option>ダ</option><option>芝</option></select>
        </div>
        <div><input id="distance" type="number" value="1800" placeholder="距離"></div>
        <div>
          <select id="grade"><option>通常</option><option>重賞</option></select>
        </div>
      </div>

      <div class="toolbar">
        <button onclick="analyze()">解析する</button>
        <button class="secondary" onclick="loadDemo()">サンプル復元</button>
      </div>
      <div class="small" id="msg"></div>
    </div>
  </section>

  <section class="card">
    <h2>レース要約</h2>
    <div class="body">
      <div class="grid" id="summary"></div>
      <div class="tags" id="tags"></div>
    </div>
  </section>

  <section class="card" style="grid-column:1 / -1">
    <h2>能力比較</h2>
    <div class="body"><div id="chart"></div></div>
  </section>

  <section class="card" style="grid-column:1 / -1">
    <h2>馬一覧</h2>
    <div class="body"><div class="tablewrap"><table id="tbl"></table></div></div>
  </section>
</main>

<footer>
  Excelの係数表に対応しやすいよう、場・芝ダ・距離・グレードで切替できる構造にしています。
</footer>

<script>
const demo = document.getElementById('jsonInput').value;

const RC = {
  "東京":{"芝":{"1400":0.8,"1600":1.0,"1800":1.0,"2000":1.0,"2200":1.0,"2400":1.2},"ダ":{}},
  "中山":{"芝":{"1200":0.95,"1600":1.0,"1800":1.0,"2000":1.0,"2200":1.2,"2500":1.2,"3600":1.05},"ダ":{}},
  "京都":{"芝":{"1200":1.0,"1400":0.8,"1600":1.0,"1800":1.0,"2000":1.0,"2200":1.2,"2400":1.2,"3000":1.3,"3200":1.25},"ダ":{}},
  "阪神":{"芝":{"1200":1.05,"1400":0.824,"1600":1.0,"1800":1.0,"2000":1.0,"2200":1.236,"2400":1.236,"3000":1.22},"ダ":{}},
  "大井":{"ダ":{"1400":1.00,"1600":1.05,"1800":1.10,"2000":1.10,"2200":1.08},"芝":{}},
  "川崎":{"ダ":{"1400":1.00,"1500":1.02,"1600":1.05,"2100":1.08},"芝":{}},
  "船橋":{"ダ":{"1200":1.00,"1600":1.02,"1800":1.06,"1000":0.98},"芝":{}},
  "浦和":{"ダ":{"1400":1.00,"1500":1.03,"1600":1.05,"2000":1.05},"芝":{}},
  "門別":{"ダ":{"1000":0.98,"1200":1.00,"1600":1.02,"1700":1.03,"1800":1.03,"2000":1.04},"芝":{}},
  "園田":{"ダ":{"1400":1.00,"1700":1.02,"1870":1.05,"1875":1.05},"芝":{}},
  "盛岡":{"ダ":{"1200":0.98,"1400":1.00,"1600":1.02,"1800":1.03,"2000":1.03},"芝":{}},
  "水沢":{"ダ":{"1300":0.98,"1400":1.00,"1600":1.02,"1800":1.03,"2000":1.04},"芝":{}},
  "高知":{"ダ":{"1300":0.98,"1400":1.00,"1600":1.02,"1900":1.03},"芝":{}}
};

const COURSE = {
  "東京_芝_2000":{"rc":1.00,"senkou":1.00,"late":1.00,"sbo":"OFF"},
  "中山_芝_1600":{"rc":1.00,"senkou":1.15,"late":1.20,"sbo":"OFF"},
  "中山_芝_1800":{"rc":1.00,"senkou":1.00,"late":1.20,"sbo":"OFF"},
  "中山_芝_2000":{"rc":1.10,"senkou":0.90,"late":1.20,"sbo":"OFF"},
  "京都_芝_3200":{"rc":1.22,"senkou":1.02,"late":1.12,"sbo":"OFF"},
  "阪神_芝_1400":{"rc":1.00,"senkou":1.00,"late":1.00,"sbo":"OFF"},
  "大井_ダ_1800":{"rc":1.10,"senkou":1.05,"late":1.18,"sbo":"OFF"},
  "大井_ダ_2000":{"rc":1.10,"senkou":1.05,"late":1.18,"sbo":"OFF"},
  "川崎_ダ_1600":{"rc":1.05,"senkou":1.08,"late":1.08,"sbo":"OFF"},
  "船橋_ダ_1800":{"rc":1.06,"senkou":1.05,"late":1.08,"sbo":"OFF"},
  "浦和_ダ_1500":{"rc":1.03,"senkou":1.04,"late":1.06,"sbo":"OFF"},
  "門別_ダ_1700":{"rc":1.03,"senkou":1.03,"late":1.05,"sbo":"OFF"},
  "園田_ダ_1700":{"rc":1.04,"senkou":1.04,"late":1.06,"sbo":"OFF"},
  "盛岡_ダ_1800":{"rc":1.03,"senkou":1.03,"late":1.05,"sbo":"OFF"},
  "水沢_ダ_1600":{"rc":1.03,"senkou":1.03,"late":1.05,"sbo":"OFF"},
  "高知_ダ_1400":{"rc":1.02,"senkou":1.02,"late":1.04,"sbo":"OFF"}
};

function loadDemo(){
  document.getElementById('jsonInput').value = demo;
  document.getElementById('venue').value = '大井';
  document.getElementById('surface').value = 'ダ';
  document.getElementById('distance').value = 1800;
  document.getElementById('grade').value = '通常';
  analyze();
}

function pick(x, d=1){ return Number.isFinite(+x) ? +x : d; }

function rcCoef(venue, surface, distance){
  return pick(RC[venue]?.[surface]?.[String(distance)], 1);
}

function courseCoef(venue, surface, distance){
  return COURSE[`${venue}_${surface}_${distance}`] || {rc:1,senkou:1,late:1,sbo:'OFF'};
}

function baseScore(h){
  return h.sp*0.45 + h.senkou*0.20 + h.sp_max*0.20 + h.suikyaku*0.15;
}

function paceType(h){
  if(h.senkou >= 98 && h.suikyaku < 80) return '逃げ先行';
  if(h.senkou >= 90) return '先行';
  if(h.suikyaku >= 92) return '差し追込';
  if(h.suikyaku >= 84) return '差し';
  return 'バランス';
}

function analyze(){
  try{
    const data = JSON.parse(document.getElementById('jsonInput').value);
    const venue = document.getElementById('venue').value.trim() || data.race_info?.venue || '-';
    const surface = document.getElementById('surface').value || data.race_info?.surface || 'ダ';
    const distance = pick(document.getElementById('distance').value, data.race_info?.distance || 0);
    const grade = document.getElementById('grade').value || data.race_info?.grade || '通常';

    const rc = rcCoef(venue, surface, distance);
    const cf = courseCoef(venue, surface, distance);

    const horses = [...(data.horses || [])].map(h => {
      const pace = paceType(h);
      const rcPart = h.sp * rc;
      const senkouPart = h.senkou * cf.senkou;
      const latePart = h.suikyaku * cf.late;
      const balanced = baseScore(h) * cf.rc;
      const gradeBonus = grade === '重賞' ? 1.03 : 1.00;
      const typeBonus = pace === '先行' || pace === '逃げ先行' ? 1.02 : pace === '差し追込' ? 1.01 : 1.00;
      const score = (balanced + rcPart*0.10 + senkouPart*0.10 + latePart*0.10) * gradeBonus * typeBonus;
      return {...h, pace, score};
    }).sort((a,b)=>b.score-a.score);

    const topSp = [...horses].sort((a,b)=>b.sp-a.sp)[0];
    const topSen = [...horses].sort((a,b)=>b.senkou-a.senkou)[0];
    const topLate = [...horses].sort((a,b)=>b.suikyaku-a.suikyaku)[0];
    const topAll = horses[0];

    document.getElementById('summary').innerHTML = [
      ['開催場', venue],
      ['距離', distance + 'm'],
      ['馬場', surface],
      ['グレード', grade]
    ].map(([k,v]) => `<div class="kv"><b>${k}</b><span>${v}</span></div>`).join('');

    document.getElementById('tags').innerHTML = [
      `軸候補: ${topSp?.name || '-'}`,
      `先行候補: ${topSen?.name || '-'}`,
      `末脚候補: ${topLate?.name || '-'}`,
      `総合1位: ${topAll?.name || '-'}`,
      `RC係数: ${rc.toFixed(3)}`,
      `コース係数: ${cf.rc.toFixed(2)}`,
      `SBO: ${cf.sbo}`
    ].map(t => `<span class="pill">${t}</span>`).join('');

    document.getElementById('tbl').innerHTML = `
      <tr>
        <th>番</th><th>馬名</th><th>SP</th><th>先行</th><th>SP最大</th><th>末脚</th><th>脚質</th><th>総合</th><th>印</th>
      </tr>
      ${horses.map((h,i)=>{
        const cls = i===0 ? 'good' : i<4 ? 'warn' : 'bad';
        const mark = i===0 ? '軸' : i<4 ? '相手' : '候補';
        return `<tr>
          <td>${h.num}</td>
          <td>${h.name}</td>
          <td>${(+h.sp).toFixed(1)}</td>
          <td>${(+h.senkou).toFixed(0)}</td>
          <td>${(+h.sp_max).toFixed(0)}</td>
          <td>${(+h.suikyaku).toFixed(0)}</td>
          <td>${h.pace}</td>
          <td>${h.score.toFixed(1)}</td>
          <td><span class="badge ${cls}">${mark}</span></td>
        </tr>`;
      }).join('')}
    `;

    Plotly.newPlot('chart', [{
      type:'bar',
      orientation:'h',
      y: horses.slice(0,10).map(h => `${h.num} ${h.name}`),
      x: horses.slice(0,10).map(h => h.score),
      marker:{color: horses.slice(0,10).map((_,i)=> i===0 ? '#79c4ff' : '#53e08b')},
      hovertemplate:'%{y}<br>総合:%{x:.1f}<extra></extra>'
    }], {
      paper_bgcolor:'rgba(0,0,0,0)',
      plot_bgcolor:'rgba(0,0,0,0)',
      margin:{l:130,r:20,t:10,b:40},
      xaxis:{title:'総合'},
      yaxis:{title:'馬'},
      showlegend:false
    });

    document.getElementById('msg').textContent = `解析完了: ${horses.length}頭 / ${venue}_${surface}_${distance}`;
  }catch(e){
    document.getElementById('msg').textContent = 'JSONの形式を確認してください';
  }
}
analyze();
</script>
</body>
</html>
